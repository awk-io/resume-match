<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyword Matcher</title>
    <style>
        /* ===== CSS Variables ===== */
        :root {
            --bg: #e8e8e0;
            --surface: #ffffff;
            --surface-alt: #f5f5f0;
            --border: #c8c8c0;
            --border-light: #d6d6ce;
            --text: #1a1a1a;
            --text-secondary: #444;
            --text-muted: #777;
            --text-light: #999;
            --shadow: rgba(0,0,0,0.05);
            --btn-bg: #222;
            --btn-text: #fff;
            --btn-hover: #444;
            --status-color: #666;
            --score-bg: #d0d0c8;
            --score-text: #111;
            --matched-color: #2e7d32;
            --missing-color: #c62828;
            --suggest-bg: #e8e8e0;
            --input-bg: #f5f5f0;
            --input-border: #d0d0c8;
            --input-focus: #888;
            --placeholder: #aaa;
        }

        [data-theme="dark"] {
            --bg: #0a0a0a;
            --surface: #141414;
            --surface-alt: #1e1e1e;
            --border: #2a2a2a;
            --border-light: #2a2a2a;
            --text: #e8e8e8;
            --text-secondary: #aaa;
            --text-muted: #777;
            --text-light: #555;
            --shadow: rgba(0,0,0,0.4);
            --btn-bg: #e8e8e8;
            --btn-text: #0a0a0a;
            --btn-hover: #ffffff;
            --status-color: #888;
            --score-bg: #2a2a2a;
            --score-text: #e8e8e8;
            --matched-color: #66bb6a;
            --missing-color: #ef5350;
            --suggest-bg: #1e1e1e;
            --input-bg: #1a1a1a;
            --input-border: #2a2a2a;
            --input-focus: #444;
            --placeholder: #555;
        }

        /* ===== Reset ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .container {
            max-width: 1100px;
            width: 100%;
            background: var(--surface);
            padding: 30px 35px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 12px var(--shadow);
            transition: background 0.3s ease, border 0.3s ease, box-shadow 0.3s ease;
        }

        /* ===== Header ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-light);
            padding-bottom: 12px;
            margin-bottom: 24px;
            transition: border 0.3s ease;
        }

        h1 {
            font-size: 22px;
            font-weight: 300;
            letter-spacing: 2px;
            color: var(--text);
            text-transform: uppercase;
            transition: color 0.3s ease;
        }

        .theme-toggle {
            background: var(--surface-alt);
            border: 1px solid var(--border);
            padding: 6px 16px;
            font-size: 11px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-radius: 0;
        }

        .theme-toggle:hover {
            background: var(--border);
            color: var(--text);
        }

        /* ===== Grid ===== */
        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 16px;
        }

        .field {
            display: flex;
            flex-direction: column;
        }

        .field label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 6px;
            transition: color 0.3s ease;
        }

        .field textarea {
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            padding: 10px 12px;
            font-size: 14px;
            font-family: inherit;
            color: var(--text);
            resize: vertical;
            min-height: 160px;
            line-height: 1.7;
            width: 100%;
            transition: background 0.3s ease, border 0.3s ease, color 0.3s ease;
        }

        .field textarea:focus {
            outline: none;
            border-color: var(--input-focus);
            background: var(--surface);
        }

        .field textarea::placeholder {
            color: var(--placeholder);
            font-weight: 300;
        }

        .word-count {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
            text-align: right;
            transition: color 0.3s ease;
        }

        /* ===== File Row ===== */
        .file-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .file-row label {
            background: var(--surface-alt);
            padding: 4px 16px;
            font-size: 11px;
            font-weight: 500;
            color: var(--text-secondary);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.15s ease;
            text-transform: none;
            letter-spacing: 0;
        }

        .file-row label:hover {
            background: var(--border);
            color: var(--text);
        }

        .file-row input[type="file"] {
            display: none;
        }

        .file-row .fname {
            font-size: 12px;
            color: var(--text-muted);
            max-width: 150px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            transition: color 0.3s ease;
        }

        /* ===== Actions ===== */
        .actions {
            display: flex;
            gap: 12px;
            margin: 16px 0 20px 0;
            flex-wrap: wrap;
            border-top: 1px solid var(--border-light);
            padding-top: 16px;
            transition: border 0.3s ease;
        }

        .btn {
            background: var(--btn-bg);
            border: 1px solid var(--btn-bg);
            padding: 8px 28px;
            font-size: 12px;
            font-weight: 500;
            color: var(--btn-text);
            cursor: pointer;
            transition: all 0.15s ease;
            font-family: inherit;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .btn:hover {
            background: var(--btn-hover);
            border-color: var(--btn-hover);
        }

        .btn-outline {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .btn-outline:hover {
            background: var(--surface-alt);
            color: var(--text);
            border-color: var(--text-muted);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* ===== Status ===== */
        .status {
            font-size: 13px;
            color: var(--status-color);
            padding: 6px 0 10px 0;
            border-bottom: 1px solid var(--border-light);
            margin-bottom: 12px;
            min-height: 30px;
            transition: color 0.3s ease, border 0.3s ease;
        }

        /* ===== Results ===== */
        .results {
            display: none;
            border-top: 1px solid var(--border-light);
            padding-top: 18px;
            margin-top: 6px;
            flex-direction: column;
            gap: 14px;
            transition: border 0.3s ease;
        }

        .results.visible {
            display: flex;
        }

        .score-area {
            display: flex;
            align-items: center;
            gap: 24px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-light);
            transition: border 0.3s ease;
        }

        .score-circle {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--score-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            color: var(--score-text);
            flex-shrink: 0;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .score-circle.high { background: #2e7d32; color: #fff; }
        .score-circle.medium { background: #f9a825; color: #1a1a1a; }
        .score-circle.low { background: #c62828; color: #fff; }

        [data-theme="dark"] .score-circle.high { background: #43a047; color: #fff; }
        [data-theme="dark"] .score-circle.medium { background: #fdd835; color: #0a0a0a; }
        [data-theme="dark"] .score-circle.low { background: #e53935; color: #fff; }

        .stats {
            display: flex;
            gap: 24px;
            font-size: 13px;
            color: var(--text-secondary);
            transition: color 0.3s ease;
        }

        .stats span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stats strong {
            color: var(--text);
            font-size: 16px;
            transition: color 0.3s ease;
        }

        /* ===== Lists ===== */
        .lists {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .list-box {
            background: var(--surface-alt);
            border: 1px solid var(--border-light);
            padding: 12px 16px;
            transition: background 0.3s ease, border 0.3s ease;
        }

        .list-box h3 {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 6px;
            border-bottom: 1px solid var(--border-light);
            padding-bottom: 4px;
            transition: color 0.3s ease, border 0.3s ease;
        }

        .list-box ul {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 200px;
            overflow-y: auto;
        }

        .list-box ul li {
            font-size: 13px;
            color: var(--text);
            padding: 3px 0 3px 22px;
            position: relative;
            line-height: 1.6;
            transition: color 0.3s ease;
        }

        .list-box ul li::before {
            position: absolute;
            left: 0;
            top: 3px;
            font-size: 13px;
        }

        .list-box ul li.match::before { content: "✓"; color: var(--matched-color); }
        .list-box ul li.miss::before { content: "✗"; color: var(--missing-color); }
        .list-box ul li.empty { color: var(--text-muted); font-style: italic; padding-left: 0; }
        .list-box ul li.empty::before { content: none; }

        /* ===== Suggestions ===== */
        .suggest-box {
            background: var(--surface-alt);
            border: 1px solid var(--border-light);
            padding: 12px 16px;
            transition: background 0.3s ease, border 0.3s ease;
        }

        .suggest-box h3 {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 6px;
            border-bottom: 1px solid var(--border-light);
            padding-bottom: 4px;
            transition: color 0.3s ease, border 0.3s ease;
        }

        .suggest-box ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-wrap: wrap;
            gap: 6px 10px;
        }

        .suggest-box ul li {
            font-size: 12px;
            color: var(--text);
            background: var(--suggest-bg);
            padding: 2px 12px;
            border: 1px solid var(--border);
            transition: background 0.3s ease, color 0.3s ease, border 0.3s ease;
        }

        .suggest-box ul li.empty {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-style: italic;
            padding: 0;
        }

        /* ===== Scrollbar ===== */
        .list-box ul::-webkit-scrollbar {
            width: 4px;
        }

        .list-box ul::-webkit-scrollbar-track {
            background: transparent;
        }

        .list-box ul::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        /* ===== Responsive ===== */
        @media (max-width: 700px) {
            .row, .lists {
                grid-template-columns: 1fr;
            }
            .container {
                padding: 16px;
            }
            .score-area {
                flex-wrap: wrap;
                gap: 12px;
            }
            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            .stats {
                flex-wrap: wrap;
                gap: 12px;
            }
        }

        @media (max-width: 450px) {
            .actions {
                flex-direction: column;
            }
            .btn {
                width: 100%;
                justify-content: center;
                text-align: center;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>keyword matcher</h1>
        <button class="theme-toggle" id="themeToggle">dark mode</button>
    </div>

    <div class="status" id="status">ready</div>

    <div class="row">
        <div class="field">
            <label for="jobText">job description</label>
            <textarea id="jobText" placeholder="paste job description here"></textarea>
            <div class="word-count" id="jobCount">0 words</div>
        </div>
        <div class="field">
            <label for="resumeText">resume</label>
            <textarea id="resumeText" placeholder="paste resume here or upload .txt"></textarea>
            <div class="file-row">
                <label for="fileInput">upload .txt</label>
                <input type="file" id="fileInput" accept=".txt">
                <span class="fname" id="fileName">no file</span>
            </div>
            <div class="word-count" id="resumeCount">0 words</div>
        </div>
    </div>

    <div class="actions">
        <button class="btn" id="analyzeBtn">analyze</button>
        <button class="btn btn-outline" id="clearBtn">clear</button>
        <button class="btn btn-outline" id="sampleBtn">load sample</button>
    </div>

    <div class="results" id="results">
        <div class="score-area">
            <div class="score-circle" id="scoreCircle">0%</div>
            <div class="stats">
                <span>matched: <strong id="matchedNum">0</strong></span>
                <span>missing: <strong id="missingNum">0</strong></span>
                <span>total: <strong id="totalNum">0</strong></span>
            </div>
        </div>

        <div class="lists">
            <div class="list-box">
                <h3>matched keywords</h3>
                <ul id="matchedList"></ul>
            </div>
            <div class="list-box">
                <h3>missing keywords</h3>
                <ul id="missingList"></ul>
            </div>
        </div>

        <div class="suggest-box">
            <h3>suggested keywords to add</h3>
            <ul id="suggestList"></ul>
        </div>
    </div>
</div>

<script>
    (function() {
        'use strict';

        // ===== DOM REFS =====
        const jobText = document.getElementById('jobText');
        const resumeText = document.getElementById('resumeText');
        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('fileName');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const clearBtn = document.getElementById('clearBtn');
        const sampleBtn = document.getElementById('sampleBtn');
        const statusEl = document.getElementById('status');
        const results = document.getElementById('results');
        const scoreCircle = document.getElementById('scoreCircle');
        const matchedNum = document.getElementById('matchedNum');
        const missingNum = document.getElementById('missingNum');
        const totalNum = document.getElementById('totalNum');
        const matchedList = document.getElementById('matchedList');
        const missingList = document.getElementById('missingList');
        const suggestList = document.getElementById('suggestList');
        const jobCount = document.getElementById('jobCount');
        const resumeCount = document.getElementById('resumeCount');
        const themeToggle = document.getElementById('themeToggle');

        // ===== THEME =====
        let currentTheme = localStorage.getItem('kw-theme') || 'light';

        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            currentTheme = theme;
            localStorage.setItem('kw-theme', theme);
            themeToggle.textContent = theme === 'dark' ? 'light mode' : 'dark mode';
        }

        applyTheme(currentTheme);

        themeToggle.addEventListener('click', function() {
            applyTheme(currentTheme === 'dark' ? 'light' : 'dark');
        });

        // ===== UTILITY FUNCTIONS =====
        function setStatus(msg) {
            statusEl.textContent = msg;
        }

        function countWords(text) {
            const t = text.trim();
            return t ? t.split(/\s+/).length : 0;
        }

        function updateCounts() {
            jobCount.textContent = countWords(jobText.value) + ' words';
            resumeCount.textContent = countWords(resumeText.value) + ' words';
        }

        // ===== EVENT: word count =====
        jobText.addEventListener('input', updateCounts);
        resumeText.addEventListener('input', updateCounts);
        updateCounts();

        // ===== FILE UPLOAD =====
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            fileName.textContent = file.name;
            const reader = new FileReader();
            reader.onload = function(ev) {
                resumeText.value = ev.target.result;
                updateCounts();
                setStatus('loaded: ' + file.name);
            };
            reader.onerror = function() {
                setStatus('error reading file');
            };
            reader.readAsText(file);
        });

        // ===== DRAG AND DROP =====
        resumeText.addEventListener('dragover', function(e) {
            e.preventDefault();
            resumeText.style.borderColor = '#888';
        });

        resumeText.addEventListener('dragleave', function(e) {
            e.preventDefault();
            resumeText.style.borderColor = '';
        });

        resumeText.addEventListener('drop', function(e) {
            e.preventDefault();
            resumeText.style.borderColor = '';
            const file = e.dataTransfer.files[0];
            if (!file) return;
            fileName.textContent = file.name;
            const reader = new FileReader();
            reader.onload = function(ev) {
                resumeText.value = ev.target.result;
                updateCounts();
                setStatus('loaded: ' + file.name);
            };
            reader.readAsText(file);
        });

        // ===== KEYWORD EXTRACTION =====
        function extractKeywords(text) {
            if (!text || text.trim() === '') return [];

            const cleaned = text.toLowerCase()
                .replace(/[^a-z0-9 ]/g, ' ')
                .replace(/\s+/g, ' ')
                .trim();

            if (!cleaned) return [];

            const words = cleaned.split(' ').filter(w => w.length > 2);

            const stop = new Set([
                'the','and','for','are','but','not','you','all','can','had','her','was','one','our','out','see','she','two','use','way','who','your','about','above','after','again','against','along','among','around','because','before','behind','below','beneath','beside','between','beyond','during','except','inside','outside','over','under','upon','through','toward','within','without','according','actually','adjusted','almost','already','although','always','amount','anyhow','anything','anyway','anywhere','became','become','becomes','becoming','being','besides','both','cannot','certain','certainly','clear','clearly','come','could','did','different','does','done','down','each','either','enough','especially','even','ever','every','everyone','everything','everywhere','except','fairly','few','former','formerly','further','furthermore','get','give','given','go','gone','got','great','greatly','had','has','hasnt','having','he','hence','her','here','hereafter','hereby','herein','hereupon','hers','herself','him','himself','his','how','however','hundred','if','indeed','instead','into','is','it','its','itself','just','keep','kept','know','known','least','less','let','like','likely','make','many','may','me','meanwhile','might','more','moreover','most','mostly','much','must','my','myself','name','namely','neither','never','nevertheless','next','no','nobody','none','noone','nor','not','nothing','now','nowhere','of','off','often','on','only','onto','or','other','others','otherwise','our','ours','ourselves','out','over','own','part','particular','particularly','per','perhaps','please','possible','presumably','probably','rather','really','regarding','right','same','seem','seemed','seeming','seems','serious','several','she','should','since','so','some','somehow','someone','something','sometime','sometimes','somewhat','somewhere','still','such','than','that','their','them','themselves','then','thence','there','thereafter','thereby','therefore','therein','thereupon','these','they','this','those','though','through','throughout','thru','thus','to','together','too','toward','towards','under','unless','until','up','upon','us','very','was','we','well','were','what','whatever','when','whence','whenever','where','whereafter','whereas','whereby','wherein','whereupon','wherever','whether','which','while','whither','who','whoever','whole','whom','whose','why','will','with','within','without','would','yet','you','your','yours','yourself','yourselves','experience','especially','required','preferred','nice','good','great','excellent','strong','solid','proven','track','record','history','looking','seeking','hiring','role','position','team','company','client','project','manage','management','lead','leading','led','responsible','responsibilities','duties','tasks','activities','support','provide','ensure','maintain','develop','developing','implement','implementing','design','designing','build','building','create','creating','plan','planning','coordinate','coordinating','analyze','analyzing','evaluate','evaluating','improve','improving','increase','decrease','reduce','growth','grow','exceed','achieve'
            ]);

            const filtered = words.filter(w => !stop.has(w));

            const unique = [];
            const seen = new Set();
            for (const w of filtered) {
                if (!seen.has(w)) {
                    seen.add(w);
                    unique.push(w);
                }
            }

            return unique;
        }

        // ===== ANALYSIS =====
        function analyze() {
            const job = jobText.value.trim();
            const resume = resumeText.value.trim();

            if (!job || !resume) {
                results.classList.remove('visible');
                setStatus('please enter both job description and resume');
                return;
            }

            setStatus('analyzing...');

            const jobKeywords = extractKeywords(job);
            const resumeKeywords = extractKeywords(resume);

            const matched = [];
            const missing = [];

            for (const kw of jobKeywords) {
                let found = false;
                for (const rk of resumeKeywords) {
                    if (rk === kw || rk.includes(kw) || kw.includes(rk)) {
                        found = true;
                        break;
                    }
                }
                if (found) {
                    matched.push(kw);
                } else {
                    missing.push(kw);
                }
            }

            const total = jobKeywords.length;
            const matchCount = matched.length;
            const missCount = missing.length;
            const score = total > 0 ? Math.round((matchCount / total) * 100) : 0;

            // Score
            scoreCircle.textContent = score + '%';
            scoreCircle.className = 'score-circle';
            if (score >= 70) scoreCircle.classList.add('high');
            else if (score >= 40) scoreCircle.classList.add('medium');
            else scoreCircle.classList.add('low');

            matchedNum.textContent = matchCount;
            missingNum.textContent = missCount;
            totalNum.textContent = total;

            // Matched
            matchedList.innerHTML = '';
            if (matched.length > 0) {
                for (const kw of matched) {
                    const li = document.createElement('li');
                    li.className = 'match';
                    li.textContent = kw;
                    matchedList.appendChild(li);
                }
            } else {
                const li = document.createElement('li');
                li.className = 'empty';
                li.textContent = 'none';
                matchedList.appendChild(li);
            }

            // Missing
            missingList.innerHTML = '';
            if (missing.length > 0) {
                for (const kw of missing) {
                    const li = document.createElement('li');
                    li.className = 'miss';
                    li.textContent = kw;
                    missingList.appendChild(li);
                }
            } else {
                const li = document.createElement('li');
                li.className = 'empty';
                li.textContent = 'all keywords matched!';
                missingList.appendChild(li);
            }

            // Suggestions
            suggestList.innerHTML = '';
            if (missing.length > 0) {
                const top = missing.slice(0, 12);
                for (const kw of top) {
                    const li = document.createElement('li');
                    li.textContent = kw;
                    suggestList.appendChild(li);
                }
                if (missing.length > 12) {
                    const li = document.createElement('li');
                    li.textContent = '+' + (missing.length - 12) + ' more';
                    li.style.background = 'transparent';
                    li.style.border = 'none';
                    li.style.color = 'var(--text-muted)';
                    suggestList.appendChild(li);
                }
            } else {
                const li = document.createElement('li');
                li.className = 'empty';
                li.textContent = 'no suggestions needed';
                suggestList.appendChild(li);
            }

            results.classList.add('visible');
            setStatus('complete - ' + matchCount + ' matched, ' + missCount + ' missing');
        }

        // ===== EVENT LISTENERS =====
        analyzeBtn.addEventListener('click', analyze);

        clearBtn.addEventListener('click', function() {
            jobText.value = '';
            resumeText.value = '';
            fileInput.value = '';
            fileName.textContent = 'no file';
            results.classList.remove('visible');
            updateCounts();
            setStatus('cleared');
        });

        sampleBtn.addEventListener('click', function() {
            jobText.value = 'Senior Software Engineer. Requirements: 5+ years Python, Django or Flask, AWS (EC2, S3, RDS), React.js, Docker, Kubernetes, PostgreSQL, REST API, problem-solving, communication, team leadership, Agile.';
            resumeText.value = 'Software Engineer. 4 years Python, Django (2 years), Flask (1 year), AWS S3 and EC2, React.js (2 years), PostgreSQL, REST API, Docker, Git, Agile, cross-functional collaboration.';
            updateCounts();
            setTimeout(analyze, 200);
            setStatus('sample loaded');
        });

        // ===== AUTO-ANALYZE =====
        let timer = null;
        function autoAnalyze() {
            if (results.classList.contains('visible')) {
                clearTimeout(timer);
                timer = setTimeout(analyze, 500);
            }
        }

        jobText.addEventListener('input', autoAnalyze);
        resumeText.addEventListener('input', autoAnalyze);

        // ===== KEYBOARD SHORTCUT =====
        document.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                analyze();
            }
        });

        // ===== START EMPTY =====
        jobText.value = '';
        resumeText.value = '';
        updateCounts();
        results.classList.remove('visible');
        setStatus('ready - paste text and click analyze');

    })();
</script>

</body>
</html>
