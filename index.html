<!-- index.html - Single file, self-contained, empty by default -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>keyword matcher</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f0f0eb;
            font-family: 'Helvetica', 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1.5rem;
        }

        .app {
            max-width: 1000px;
            width: 100%;
            background: #ffffff;
            padding: 2rem 2.2rem;
            border: 1px solid #d6d6ce;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        h1 {
            font-size: 1.2rem;
            font-weight: 400;
            letter-spacing: 1px;
            color: #2a2a26;
            text-transform: uppercase;
            border-bottom: 1px solid #d0d0c8;
            padding-bottom: 0.6rem;
            margin-bottom: 1.8rem;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 1.2rem;
        }

        .field {
            display: flex;
            flex-direction: column;
        }

        .field label {
            font-size: 0.7rem;
            font-weight: 500;
            color: #4a4a44;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.3rem;
        }

        .field textarea {
            background: #f8f8f4;
            border: 1px solid #d0d0c8;
            padding: 0.7rem 0.9rem;
            font-size: 0.8rem;
            font-family: inherit;
            color: #1e1e1a;
            resize: vertical;
            min-height: 140px;
            line-height: 1.6;
            width: 100%;
            transition: border 0.1s;
        }

        .field textarea:focus {
            outline: none;
            border-color: #b0b0a6;
        }

        .field textarea::placeholder {
            color: #a0a098;
            font-weight: 300;
        }

        .upload-row {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-top: 0.4rem;
            flex-wrap: wrap;
        }

        .upload-row label {
            background: #f0f0ea;
            padding: 0.2rem 1.2rem;
            font-size: 0.65rem;
            font-weight: 500;
            color: #3a3a34;
            border: 1px solid #d0d0c8;
            cursor: pointer;
            text-transform: none;
            letter-spacing: 0;
            transition: background 0.1s;
        }

        .upload-row label:hover {
            background: #e4e4dc;
        }

        .upload-row input[type="file"] {
            display: none;
        }

        .upload-row .fname {
            font-size: 0.65rem;
            color: #7a7a72;
            max-width: 140px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .actions {
            display: flex;
            gap: 0.8rem;
            margin: 0.8rem 0 1.2rem 0;
            flex-wrap: wrap;
            border-top: 1px solid #e0e0d8;
            padding-top: 1rem;
        }

        .btn {
            background: #2a2a26;
            border: 1px solid #2a2a26;
            padding: 0.4rem 2rem;
            font-size: 0.7rem;
            font-weight: 500;
            color: #ffffff;
            cursor: pointer;
            transition: background 0.1s;
            font-family: inherit;
            letter-spacing: 0.3px;
        }

        .btn:hover {
            background: #3e3e38;
        }

        .btn-outline {
            background: transparent;
            color: #4a4a44;
            border: 1px solid #d0d0c8;
        }

        .btn-outline:hover {
            background: #f0f0ea;
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: default;
        }

        .results {
            display: none;
            border-top: 1px solid #d0d0c8;
            padding-top: 1.2rem;
            margin-top: 0.2rem;
            flex-direction: column;
            gap: 1rem;
        }

        .results.visible {
            display: flex;
        }

        .score-line {
            display: flex;
            align-items: center;
            gap: 1.6rem;
            padding-bottom: 0.4rem;
            border-bottom: 1px solid #e8e8e0;
        }

        .score-circle {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            background: #d0d0c8;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 600;
            color: #1e1e1a;
            flex-shrink: 0;
        }

        .score-circle.high { background: #b0c8b0; }
        .score-circle.medium { background: #d0c8a0; }
        .score-circle.low { background: #c8b0a8; }

        .stats {
            display: flex;
            gap: 1.8rem;
            font-size: 0.75rem;
            color: #4a4a44;
        }

        .stats span {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .bulletin-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .box {
            background: #f8f8f4;
            border: 1px solid #d6d6ce;
            padding: 0.8rem 1rem;
        }

        .box h3 {
            font-size: 0.65rem;
            font-weight: 600;
            color: #4a4a44;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            margin-bottom: 0.4rem;
            border-bottom: 1px solid #e0e0d8;
            padding-bottom: 0.2rem;
        }

        .box ul {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 180px;
            overflow-y: auto;
        }

        .box ul li {
            font-size: 0.75rem;
            color: #2a2a26;
            padding: 0.1rem 0 0.1rem 1.2rem;
            position: relative;
            line-height: 1.5;
        }

        .box ul li::before {
            position: absolute;
            left: 0;
            font-size: 0.6rem;
            color: #7a7a72;
        }

        .box ul li.match::before { content: '✓'; color: #2a6a2a; }
        .box ul li.miss::before { content: '✗'; color: #aa4a3a; }
        .box ul li.empty { color: #8a8a82; font-style: italic; padding-left: 0; }
        .box ul li.empty::before { content: none; }

        .suggest-box {
            background: #f8f8f4;
            border: 1px solid #d6d6ce;
            padding: 0.8rem 1rem;
        }

        .suggest-box h3 {
            font-size: 0.65rem;
            font-weight: 600;
            color: #4a4a44;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            margin-bottom: 0.3rem;
            border-bottom: 1px solid #e0e0d8;
            padding-bottom: 0.2rem;
        }

        .suggest-box ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem 0.6rem;
        }

        .suggest-box ul li {
            font-size: 0.7rem;
            color: #2a2a26;
            background: #e8e8e0;
            padding: 0.05rem 0.6rem;
            border: 1px solid #d0d0c8;
        }

        .suggest-box ul li.empty {
            background: transparent;
            border: none;
            color: #8a8a82;
            font-style: italic;
            padding: 0;
        }

        .word-count {
            font-size: 0.6rem;
            color: #8a8a82;
            margin-top: 0.2rem;
            text-align: right;
        }

        @media (max-width: 700px) {
            .grid-2, .bulletin-2 { grid-template-columns: 1fr; }
            .app { padding: 1.2rem; }
            .score-line { flex-wrap: wrap; gap: 0.8rem; }
        }

        @media (prefers-color-scheme: dark) {
            body { background: #1a1a18; }
            .app { background: #22221e; border-color: #3a3a34; }
            h1 { color: #d0d0c8; border-color: #3a3a34; }
            .field textarea { background: #2a2a26; border-color: #3a3a34; color: #e0e0d8; }
            .field textarea::placeholder { color: #6a6a62; }
            .field label { color: #b0b0a8; }
            .upload-row label { background: #2a2a26; border-color: #3a3a34; color: #b0b0a8; }
            .upload-row label:hover { background: #3a3a34; }
            .btn { background: #d0d0c8; border-color: #d0d0c8; color: #1a1a18; }
            .btn:hover { background: #e8e8e0; }
            .btn-outline { background: transparent; color: #b0b0a8; border-color: #3a3a34; }
            .btn-outline:hover { background: #2a2a26; }
            .box { background: #2a2a26; border-color: #3a3a34; }
            .box h3 { color: #b0b0a8; border-color: #3a3a34; }
            .box ul li { color: #d0d0c8; }
            .box ul li.match::before { color: #8aba8a; }
            .box ul li.miss::before { color: #c87a6a; }
            .score-circle { background: #3a3a34; color: #e0e0d8; }
            .score-circle.high { background: #5a7a5a; }
            .score-circle.medium { background: #8a7a4a; }
            .score-circle.low { background: #7a4a3a; }
            .stats { color: #b0b0a8; }
            .suggest-box { background: #2a2a26; border-color: #3a3a34; }
            .suggest-box h3 { color: #b0b0a8; border-color: #3a3a34; }
            .suggest-box ul li { background: #3a3a34; border-color: #4a4a44; color: #d0d0c8; }
            .word-count { color: #7a7a72; }
            .upload-row .fname { color: #8a8a82; }
            .actions { border-color: #3a3a34; }
            .results { border-color: #3a3a34; }
            .score-line { border-color: #3a3a34; }
        }
    </style>
</head>
<body>
    <div class="app">
        <h1>resume keyword matcher</h1>

        <div class="grid-2">
            <div class="field">
                <label for="jobInput">job description</label>
                <textarea id="jobInput" placeholder="paste job description"></textarea>
                <div class="word-count" id="jobWordCount">0 words</div>
            </div>
            <div class="field">
                <label for="resumeInput">resume</label>
                <textarea id="resumeInput" placeholder="paste resume or upload file"></textarea>
                <div class="upload-row">
                    <label for="fileInput">upload</label>
                    <input type="file" id="fileInput" accept=".txt,.pdf">
                    <span class="fname" id="fileName">no file</span>
                </div>
                <div class="word-count" id="resumeWordCount">0 words</div>
            </div>
        </div>

        <div class="actions">
            <button class="btn" id="analyzeBtn">analyze</button>
            <button class="btn btn-outline" id="clearBtn">clear</button>
            <button class="btn btn-outline" id="sampleBtn">load sample</button>
        </div>

        <div class="results" id="resultsContainer">
            <div class="score-line">
                <div class="score-circle" id="scoreCircle">0%</div>
                <div class="stats">
                    <span>matched: <strong id="matchedCount">0</strong></span>
                    <span>missing: <strong id="missingCount">0</strong></span>
                    <span>total: <strong id="totalCount">0</strong></span>
                </div>
            </div>

            <div class="bulletin-2">
                <div class="box">
                    <h3>matched</h3>
                    <ul id="matchedList"></ul>
                </div>
                <div class="box">
                    <h3>missing</h3>
                    <ul id="missingList"></ul>
                </div>
            </div>

            <div class="suggest-box">
                <h3>suggested keywords</h3>
                <ul id="suggestList"></ul>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        (function() {
            'use strict';

            const jobInput = document.getElementById('jobInput');
            const resumeInput = document.getElementById('resumeInput');
            const fileInput = document.getElementById('fileInput');
            const fileName = document.getElementById('fileName');
            const analyzeBtn = document.getElementById('analyzeBtn');
            const clearBtn = document.getElementById('clearBtn');
            const sampleBtn = document.getElementById('sampleBtn');
            const resultsContainer = document.getElementById('resultsContainer');
            const scoreCircle = document.getElementById('scoreCircle');
            const matchedCount = document.getElementById('matchedCount');
            const missingCount = document.getElementById('missingCount');
            const totalCount = document.getElementById('totalCount');
            const matchedList = document.getElementById('matchedList');
            const missingList = document.getElementById('missingList');
            const suggestList = document.getElementById('suggestList');
            const jobWordCount = document.getElementById('jobWordCount');
            const resumeWordCount = document.getElementById('resumeWordCount');

            // Simple keyword extraction
            function extractKeywords(text) {
                if (!text || text.trim() === '') return [];
                
                const words = text.toLowerCase()
                    .replace(/[^a-z0-9\s#+.]/g, ' ')
                    .split(/\s+/)
                    .filter(w => w.length > 2 && !/^\d+$/.test(w));
                
                const stopwords = new Set([
                    'the','and','for','are','but','not','you','all','can','had','her','was',
                    'one','our','out','see','she','two','use','way','who','your','about',
                    'above','after','again','against','along','among','around','because',
                    'before','behind','below','beneath','beside','between','beyond','during',
                    'except','inside','outside','over','under','upon','through','toward',
                    'within','without','according','actually','adjusted','almost','already',
                    'although','always','amount','anyhow','anything','anyway','anywhere',
                    'around','became','become','becomes','becoming','before','behind',
                    'being','below','beside','besides','between','beyond','both','cannot',
                    'certain','certainly','clear','clearly','come','could','did','different',
                    'does','done','down','during','each','either','enough','especially',
                    'even','ever','every','everyone','everything','everywhere','except',
                    'fairly','few','for','former','formerly','from','further','furthermore',
                    'get','give','given','go','gone','got','great','greatly','had','has',
                    'hasnt','having','he','hence','her','here','hereafter','hereby','herein',
                    'hereupon','hers','herself','him','himself','his','how','however',
                    'hundred','if','indeed','instead','into','is','it','its','itself',
                    'just','keep','kept','know','known','least','less','let','like',
                    'likely','make','many','may','me','meanwhile','might','more','moreover',
                    'most','mostly','much','must','my','myself','name','namely','neither',
                    'never','nevertheless','next','no','nobody','none','noone','nor','not',
                    'nothing','now','nowhere','of','off','often','on','only','onto','or',
                    'other','others','otherwise','our','ours','ourselves','out','over',
                    'own','part','particular','particularly','per','perhaps','please',
                    'possible','presumably','probably','rather','really','regarding',
                    'right','same','seem','seemed','seeming','seems','serious','several',
                    'she','should','since','so','some','somehow','someone','something',
                    'sometime','sometimes','somewhat','somewhere','still','such','than',
                    'that','their','them','themselves','then','thence','there','thereafter',
                    'thereby','therefore','therein','thereupon','these','they','this',
                    'those','though','through','throughout','thru','thus','to','together',
                    'too','toward','towards','under','unless','until','up','upon','us',
                    'very','was','we','well','were','what','whatever','when','whence',
                    'whenever','where','whereafter','whereas','whereby','wherein',
                    'whereupon','wherever','whether','which','while','whither','who',
                    'whoever','whole','whom','whose','why','will','with','within',
                    'without','would','yet','you','your','yours','yourself','yourselves',
                    'experience','especially','required','preferred','nice','good',
                    'great','excellent','strong','solid','proven','track','record',
                    'history','looking','seeking','hiring','role','position','team',
                    'company','client','project','manage','management','lead','leading',
                    'led','responsible','responsibilities','duties','tasks','activities',
                    'support','provide','ensure','maintain','develop','developing',
                    'implement','implementing','design','designing','build','building',
                    'create','creating','plan','planning','coordinate','coordinating',
                    'analyze','analyzing','evaluate','evaluating','improve','improving',
                    'increase','decrease','reduce','growth','grow','exceed','achieve'
                ]);
                
                const filtered = words.filter(w => !stopwords.has(w));
                
                const unique = [];
                const seen = new Set();
                for (const w of filtered) {
                    if (!seen.has(w)) {
                        seen.add(w);
                        unique.push(w);
                    }
                }
                
                return unique;
            }

            function updateWordCounts() {
                const jobWords = jobInput.value.trim();
                const resumeWords = resumeInput.value.trim();
                jobWordCount.textContent = jobWords ? jobWords.split(/\s+/).length + ' words' : '0 words';
                resumeWordCount.textContent = resumeWords ? resumeWords.split(/\s+/).length + ' words' : '0 words';
            }

            jobInput.addEventListener('input', updateWordCounts);
            resumeInput.addEventListener('input', updateWordCounts);
            updateWordCounts();

            // PDF.js setup
            const pdfjsLib = window.pdfjsLib;
            if (pdfjsLib) {
                pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
            }

            // File upload handler
            fileInput.addEventListener('change', async function(e) {
                const file = e.target.files[0];
                if (!file) return;
                fileName.textContent = file.name;
                const ext = file.name.toLowerCase().split('.').pop();
                
                if (ext === 'pdf') {
                    if (!pdfjsLib) {
                        resumeInput.value = 'PDF.js library not loaded. Please refresh.';
                        updateWordCounts();
                        return;
                    }
                    try {
                        const arrayBuffer = await file.arrayBuffer();
                        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                        let fullText = '';
                        for (let i = 1; i <= pdf.numPages; i++) {
                            const page = await pdf.getPage(i);
                            const textContent = await page.getTextContent();
                            const pageText = textContent.items.map(item => item.str).join(' ');
                            fullText += pageText + '\n';
                        }
                        resumeInput.value = fullText.trim() || 'No text extracted from PDF';
                        updateWordCounts();
                    } catch (error) {
                        console.error('PDF extraction error:', error);
                        resumeInput.value = 'Error extracting PDF text. Please paste manually.';
                        updateWordCounts();
                    }
                } else {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        resumeInput.value = ev.target.result;
                        updateWordCounts();
                    };
                    reader.onerror = () => {
                        resumeInput.value = 'Error reading file';
                        updateWordCounts();
                    };
                    reader.readAsText(file);
                }
            });

            // Drag and drop
            resumeInput.addEventListener('dragover', (e) => {
                e.preventDefault();
                resumeInput.style.borderColor = '#a0a096';
            });
            resumeInput.addEventListener('dragleave', () => {
                resumeInput.style.borderColor = '';
            });
            resumeInput.addEventListener('drop', async (e) => {
                e.preventDefault();
                resumeInput.style.borderColor = '';
                const file = e.dataTransfer.files[0];
                if (!file) return;
                
                fileName.textContent = file.name;
                const ext = file.name.toLowerCase().split('.').pop();
                
                if (ext === 'pdf') {
                    if (!pdfjsLib) {
                        resumeInput.value = 'PDF.js library not loaded. Please refresh.';
                        updateWordCounts();
                        return;
                    }
                    try {
                        const arrayBuffer = await file.arrayBuffer();
                        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                        let fullText = '';
                        for (let i = 1; i <= pdf.numPages; i++) {
                            const page = await pdf.getPage(i);
                            const textContent = await page.getTextContent();
                            const pageText = textContent.items.map(item => item.str).join(' ');
                            fullText += pageText + '\n';
                        }
                        resumeInput.value = fullText.trim() || 'No text extracted from PDF';
                        updateWordCounts();
                    } catch (error) {
                        console.error('PDF extraction error:', error);
                        resumeInput.value = 'Error extracting PDF text. Please paste manually.';
                        updateWordCounts();
                    }
                } else {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        resumeInput.value = ev.target.result;
                        updateWordCounts();
                    };
                    reader.readAsText(file);
                }
            });

            // Main analysis
            function analyze() {
                const job = jobInput.value.trim();
                const resume = resumeInput.value.trim();
                
                if (!job || !resume) {
                    resultsContainer.classList.remove('visible');
                    return;
                }

                const jobKeywords = extractKeywords(job);
                const resumeKeywords = extractKeywords(resume);

                const matched = [];
                const missing = [];
                
                for (const keyword of jobKeywords) {
                    let found = false;
                    for (const rk of resumeKeywords) {
                        if (rk === keyword || rk.includes(keyword) || keyword.includes(rk)) {
                            found = true;
                            break;
                        }
                    }
                    if (found) {
                        matched.push(keyword);
                    } else {
                        missing.push(keyword);
                    }
                }

                const total = jobKeywords.length;
                const matchCount = matched.length;
                const missCount = missing.length;
                const score = total > 0 ? Math.round((matchCount / total) * 100) : 0;

                scoreCircle.textContent = score + '%';
                scoreCircle.className = 'score-circle';
                if (score >= 70) scoreCircle.classList.add('high');
                else if (score >= 40) scoreCircle.classList.add('medium');
                else scoreCircle.classList.add('low');

                matchedCount.textContent = matchCount;
                missingCount.textContent = missCount;
                totalCount.textContent = total;

                matchedList.innerHTML = '';
                if (matched.length > 0) {
                    matched.forEach(k => {
                        const li = document.createElement('li');
                        li.className = 'match';
                        li.textContent = k;
                        matchedList.appendChild(li);
                    });
                } else {
                    const li = document.createElement('li');
                    li.className = 'empty';
                    li.textContent = 'none matched';
                    matchedList.appendChild(li);
                }

                missingList.innerHTML = '';
                if (missing.length > 0) {
                    missing.forEach(k => {
                        const li = document.createElement('li');
                        li.className = 'miss';
                        li.textContent = k;
                        missingList.appendChild(li);
                    });
                } else {
                    const li = document.createElement('li');
                    li.className = 'empty';
                    li.textContent = 'all keywords matched!';
                    missingList.appendChild(li);
                }

                suggestList.innerHTML = '';
                if (missing.length > 0) {
                    const top = missing.slice(0, 10);
                    top.forEach(k => {
                        const li = document.createElement('li');
                        li.textContent = k;
                        suggestList.appendChild(li);
                    });
                    if (missing.length > 10) {
                        const li = document.createElement('li');
                        li.textContent = '+' + (missing.length - 10) + ' more';
                        li.style.background = 'transparent';
                        li.style.border = 'none';
                        li.style.color = '#8a8a82';
                        suggestList.appendChild(li);
                    }
                } else {
                    const li = document.createElement('li');
                    li.className = 'empty';
                    li.textContent = 'no suggestions needed';
                    suggestList.appendChild(li);
                }

                resultsContainer.classList.add('visible');
            }

            analyzeBtn.addEventListener('click', analyze);

            clearBtn.addEventListener('click', () => {
                jobInput.value = '';
                resumeInput.value = '';
                fileInput.value = '';
                fileName.textContent = 'no file';
                resultsContainer.classList.remove('visible');
                updateWordCounts();
            });

            sampleBtn.addEventListener('click', () => {
                jobInput.value = `Senior Software Engineer

Requirements:
- 5+ years of experience with Python
- Strong knowledge of Django or Flask
- Experience with AWS (EC2, S3, RDS)
- Proficiency with React.js
- Familiarity with Docker and Kubernetes
- PostgreSQL experience
- REST API design
- Strong problem-solving skills
- Excellent communication
- Team leadership experience
- Agile development methodology`;

            jobInput.addEventListener('input', autoAnalyze);

            resultsContainer.classList.remove('visible');

            // Keyboard shortcut
